# A LoadBalancer Service whose external IP is managed outside the cluster.
# loafer publishes the annotated IP into the Service status so that
# kubectl, external-dns, and friends see it.
apiVersion: v1
kind: Service
metadata:
  name: demo
  annotations:
    loafer.dev/ips: 203.0.113.10
spec:
  type: LoadBalancer
  loadBalancerClass: loafer.dev/static
  selector:
    app: demo
  ports:
    - port: 80

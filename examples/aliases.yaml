# IP aliases: name -> IP mappings in a ConfigMap in the controller's
# namespace. Services reference the *name*; editing the ConfigMap re-points
# every Service that uses it, live, with no Service edits.
apiVersion: v1
kind: ConfigMap
metadata:
  name: loafer-ip-aliases
  namespace: loafer-system
data:
  public-lb: 203.0.113.10
  # An alias may map to several IPs (e.g. dual-stack):
  dual-stack-lb: 203.0.113.20,2001:db8::20
---
apiVersion: v1
kind: Service
metadata:
  name: demo-alias
  annotations:
    loafer.dev/ip-names: public-lb
spec:
  type: LoadBalancer
  loadBalancerClass: loafer.dev/static
  selector:
    app: demo-alias
  ports:
    - port: 80

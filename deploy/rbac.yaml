apiVersion: v1
kind: ServiceAccount
metadata:
  name: loafer
  namespace: loafer-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: loafer
rules:
  - apiGroups: [""]
    resources: [services]
    verbs: [get, list, watch]
  - apiGroups: [""]
    resources: [services/status]
    verbs: [patch, update]
  - apiGroups: [events.k8s.io]
    resources: [events]
    verbs: [create, patch, update]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: loafer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: loafer
subjects:
  - kind: ServiceAccount
    name: loafer
    namespace: loafer-system
---
# Leader election lease, namespace-scoped.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: loafer-leader-election
  namespace: loafer-system
rules:
  - apiGroups: [coordination.k8s.io]
    resources: [leases]
    verbs: [get, list, watch, create, update, patch]
  # controller-runtime's leader election announces "became leader" through
  # the legacy core events API, unlike the reconciler which uses
  # events.k8s.io.
  - apiGroups: [""]
    resources: [events]
    verbs: [create, patch]
---
# Read the IP-aliases ConfigMap. Namespace-scoped; the controller only ever
# watches the single configured ConfigMap.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: loafer-ip-aliases
  namespace: loafer-system
rules:
  - apiGroups: [""]
    resources: [configmaps]
    verbs: [get, list, watch]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: loafer-ip-aliases
  namespace: loafer-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: loafer-ip-aliases
subjects:
  - kind: ServiceAccount
    name: loafer
    namespace: loafer-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: loafer-leader-election
  namespace: loafer-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: loafer-leader-election
subjects:
  - kind: ServiceAccount
    name: loafer
    namespace: loafer-system

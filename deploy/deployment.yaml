apiVersion: apps/v1
kind: Deployment
metadata:
  name: loafer
  namespace: loafer-system
  labels:
    app.kubernetes.io/name: loafer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: loafer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: loafer
    spec:
      serviceAccountName: loafer
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: loafer
          image: ghcr.io/spideyfusion/loafer:latest
          args:
            - --config=/etc/loafer/config.yaml
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          ports:
            - name: metrics
              containerPort: 8080
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/loafer
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: loafer-config
